<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistiques Joueur - Tennis Pronostics</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div class="container mx-auto px-4 py-8">
    <div class="bg-white rounded-lg shadow-lg p-8 max-w-2xl mx-auto">
        <!-- Loading State -->
        <div id="loading" class="text-center">
            <p class="text-gray-600">Chargement...</p>
        </div>

        <!-- Player Info -->
        <div id="player-info" class="hidden text-center">
            <h1 id="player-name" class="text-3xl font-bold text-gray-800">
                <!-- Le nom complet avec pays et classement sera inséré ici -->
            </h1>
        </div>

        <!-- Error State -->
        <div id="error" class="hidden text-center">
            <p class="text-red-600">Joueur non trouvé</p>
        </div>
    </div>
</div>

<script src="player-stats.js"></script>
</body>
</html>
